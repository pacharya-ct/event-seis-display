<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="./css/style.css">
  <title>SCSN Realtime Display</title>
  <style>
    sp-organized-display {
      --sp-seismograph-height: 100px;
      background: #ecf8f9;
    }
    sp-quake-table {
      --even-row-background: #ecf8f9;
    }
    sp-station-quake-map#regionalmap {
      height: 560px;
    }
    sp-station-quake-map#worldmap {
      height: 350px;
    }
    /* Non working styles.
    change the seismograph text style,
    */
    svg.seismograph text.title {
      font-size:normal;
      font-weight: normal;
      color:black;
    }
   </style>
</head>
<body class="two-col-grid">
  <main class="main-content"><h1>SCSN Live</h1>
    <button id="disconnect">Disconnect</button>
    <button id="pause">Pause</button>
    Duration: <select id="id_sel_duration">
      <option value="PT10M">10 mins</option>
      <option value="PT30M">30 mins</option>
      <option value="PT60M">60 mins</option>
      <option value="PT90M">90 mins</option>
      <option value="PT120M">120 mins</option>
    </select>
    <span id="id_status_message"></span>
    <span class="float-right">Packets: <span id="numPackets">0</span>
    <time id="nt"></time></span>
    <div id="id_div_channels"><stream-multi-selector></stream-multi-selector></div>
    <div id="realtime"></div>
  </main>
  <lheader class="left-header">
    <img align="center" src="images/PQRS_logo_t.png" height="120" alt="SCSN Realtime Display">
  </lheader>
  <rheader class="right-header"><span>
    <h4>Powered by:</h4>
    <a href="https://www.scsn.org"><img src="images/SCSN_logo_2021_full.png" height="35" alt="SCSN"></a>
    <a class="scedc" href="https://scedc.caltech.edu/" target="blank">SCEDC</a></span>
  </rheader>
  <section class="left-sidebar">
    <error-text></error-text>
    <h3>Station and Recent Earthquake Map</h3>
    <sp-station-quake-map id="regionalmap" centerLat="35" centerLon="-118" zoomLevel="6" fitBounds="false" magScale="2.5"
      tileUrl="https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
      tileAttribution="Tiles © Esri — Sources: Esri, HERE, Garmin, Intermap, increment P Corp., GEBCO, USGS, FAO, NPS, NRCAN, GeoBase, IGN, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), (c) OpenStreetMap contributors, and the GIS User Community">
    </sp-station-quake-map>
    <sp-station-quake-map id="worldmap" centerLat="20" centerLon="-118" zoomLevel="1" fitBounds="true" magScale="2.5"
      tileUrl="https://services.arcgisonline.com/arcgis/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
      tileAttribution="Tiles © Esri — Sources: Esri, HERE, Garmin, Intermap, increment P Corp., GEBCO, USGS, FAO, NPS, NRCAN, GeoBase, IGN, Kadaster NL, Ordnance Survey, Esri Japan, METI, Esri China (Hong Kong), (c) OpenStreetMap contributors, and the GIS User Community">
    </sp-station-quake-map>
    <map-legend></map-legend><span class="float-right" id="id_evt_status"></span>
    <div>
      <h3 class="tblheader">California Regional Earthquakes in the last 6 hours</h3>
    <div class="quaketbl-wrapper">
      <sp-quake-table id="quake6h_ca"></sp-quake-table>
    </div></div>
    <div>
      <h3 class="tblheader">California Regional Earthquakes with Magnitude >= 3 in the last 7 days</h3>
      <div class="quaketbl-wrapper">
      <sp-quake-table id="quake7d_ca_mag3"></sp-quake-table>
    </div></div>
    <div>
      <h3 class="tblheader">Worldwide Earthquakes with Magnitude >= 5.5 in the last 7 days</h3>
      <div class="quaketbl-wrapper">
      <sp-quake-table id="quake7d_mag5_5"></sp-quake-table>
    </div></div>
  </section>
  <footer class="footer">
    <a href="https://www.caltech.edu" target="_blank">
      <img src="images/caltech_logo.png" height="92" alt="Caltech" >
    </a>
    <a href="https://www.seismolab.caltech.edu" target="_blank">
      <img src="images/seismo_lab_logo.png" height="92" alt="SeismoLab">
    </a>
    <a href="https://usgs.gov" target="_blank">
      <img src="images/usgs_logo.png" height="72" alt="USGS">
    </a>
  </footer>
  <script type="module" src="js/stream_multi_selector.js"></script>
  <script type="module" src="js/waveform.js"></script>
  <script type="module" src="js/event_map_table.js"></script>
  </body>
</html>
